<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APOCALYPSE SIMULATOR</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #101018;
  --bg-tertiary: #1a1a28;
  --bg-panel: rgba(12,12,20,0.96);
  --border: #252535;
  --text-1: #e0e0e8;
  --text-2: #8888a0;
  --text-3: #555570;
  --red: #ff3333;
  --orange: #ff6a00;
  --yellow: #ffc800;
  --cyan: #00d4ff;
  --green: #00ff88;
  --font-d: 'Orbitron', sans-serif;
  --font-m: 'Share Tech Mono', monospace;
  --font-b: 'Rajdhani', sans-serif;
  --header-h: 50px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body { 
  height: 100%; 
  overflow: hidden;
  background: var(--bg-primary); 
  color: var(--text-1); 
  font-family: var(--font-b);
  -webkit-tap-highlight-color: transparent;
}

/* HEADER */
header {
  position: fixed; top:0; left:0; right:0;
  height: var(--header-h);
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 8px;
  z-index: 1000;
}

header h1 {
  font-family: var(--font-d);
  font-size: clamp(16px, 5vw, 24px);
  font-weight: 900;
  letter-spacing: clamp(1px, 2vw, 4px);
  background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

.hdr-btns { display: flex; gap: 4px; }
.hdr-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-family: var(--font-m);
  font-size: 12px;
  padding: 6px 10px;
  cursor: pointer;
  transition: 0.2s;
  white-space: nowrap;
}
.hdr-btn:hover, .hdr-btn.on { border-color: var(--red); color: var(--text-1); }

/* MAP */
#map {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0; bottom: 0;
  z-index: 1;
}

/* CROSSHAIR */
#crosshair {
  position: fixed;
  top: calc(var(--header-h) + 50%);
  left: 50%;
  width: 24px; height: 24px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 400;
}
#crosshair::before, #crosshair::after {
  content:''; position:absolute; background: rgba(255,50,50,0.35);
}
#crosshair::before { width:1px; height:100%; left:50%; }
#crosshair::after { height:1px; width:100%; top:50%; }

/* COORDS BADGES */
#coords, #det-badge {
  position: fixed; background: var(--bg-panel); border: 1px solid var(--border);
  padding: 4px 8px; font-family: var(--font-m); font-size: 11px;
  z-index: 400; pointer-events: none;
}
#coords { bottom: 8px; left: 8px; color: var(--cyan); }
#det-badge { top: calc(var(--header-h) + 8px); left: 8px; color: var(--orange); }

/* CONTROL PANEL — MOBILE BOTTOM SHEET */
#panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 55vh; background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
  transition: transform 0.3s ease;
  transform: translateY(100%);
  z-index: 500;
}
#panel.open { transform: translateY(0); }

.grab-bar {
  display: flex; justify-content: center; padding: 8px 0;
  cursor: pointer; position: sticky; top:0; background: var(--bg-secondary);
}
.grab-bar .bar { width: 36px; height: 4px; background: var(--text-3); border-radius: 2px; }

/* DESKTOP: sidebar */
@media (min-width: 800px) {
  #map { right: 320px; }
  #crosshair { left: calc((100vw - 320px)/2); }
  #panel {
    top: var(--header-h); bottom:0; right:0; left:auto;
    width: 320px; height:auto;
    border-left:1px solid var(--border); border-top:none;
    transform:none;
  }
  .grab-bar { display: none; }
}

/* PANEL ELEMENTS */
.sec { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
.sec-t { font-family: var(--font-d); font-size:10px; font-weight:700; color:var(--text-3); letter-spacing:2px; margin-bottom:8px; text-transform:uppercase; }

.type-tog { display: flex; gap: 4px; margin-bottom: 8px; }
.type-btn { flex:1; padding:8px 4px; font-family: var(--font-d); font-size:10px; font-weight:700; letter-spacing:1.5px; text-align:center; cursor:pointer; background:var(--bg-tertiary); border:1px solid var(--border); transition:0.2s; }
.type-btn.on-n { background: rgba(255,50,50,0.12); border-color: var(--red); color: var(--red); }
.type-btn.on-e { background: rgba(0,180,255,0.1); border-color: var(--cyan); color: var(--cyan); }

.cg { margin-bottom: 10px; }
.cg-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.cg-top span { font-size:11px; font-weight:500; color:var(--text-2); }
.cg-top .v { font-family:var(--font-m); font-size:10px; color:var(--orange); }

input[type="range"] {
  -webkit-appearance:none; width:100%; height:4px; background:var(--bg-primary); border:1px solid var(--border); cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; background:var(--red); border:2px solid var(--bg-primary); }
input[type="range"].emp-s::-webkit-slider-thumb { background: var(--cyan); }
select { width:100%; padding:6px 8px; background:var(--bg-primary); border:1px solid var(--border); color:var(--text-1); font-family:var(--font-m); font-size:11px; }

.act { width:100%; padding:10px; border:1px solid; font-family:var(--font-d); font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-bottom:6px; background:transparent; }
.act-n { border-color:var(--red); color:var(--red); }
.act-n:hover { background: rgba(255,30,30,0.2); }
.act-e { border-color:var(--cyan); color:var(--cyan); }
.act-e:hover { background: rgba(0,180,255,0.15); }

/* LEGEND & TOOLTIP */
.zl { display:flex; flex-direction:column; gap:4px; }
.zi { display:flex; align-items:center; gap:6px; font-size:10px; }
.zd { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.zn { color:var(--text-2); flex:1; }
.zr { font-family:var(--font-m); font-size:9px; color:var(--text-3); }

/* FLASH */
#flash { display:none; position:fixed; inset:0; z-index:1500; pointer-events:none; }
#flash.go { display:block; animation: flashAnim 0.7s ease-out forwards; }
@keyframes flashAnim { 0%{opacity:.85} 15%{opacity:.5} 100%{opacity:0} }

/* MODAL */
#info-modal { display:none; position:fixed; inset:0; background: rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; padding:16px; backdrop-filter:blur(4px); }
#info-modal.show { display:flex; }
.modal { background: var(--bg-secondary); border:1px solid var(--border); max-width:500px; width:100%; max-height:80vh; overflow-y:auto; padding:20px; position:relative; }
.modal h2 { font-family:var(--font-d); font-size:14px; color:var(--orange); margin-bottom:12px; }
.modal h3 { font-family:var(--font-d); font-size:11px; color:var(--red); margin:10px 0 6px; }
.modal p { font-size:13px; line-height:1.5; color:var(--text-2); margin-bottom:6px; }
.modal-x { position:absolute; top:8px; right:10px; background:none; border:none; color:var(--text-3); font-size:18px; cursor:pointer; }

/* LEAFLET */
.leaflet-container { background: #080810 !important; }
.leaflet-control-zoom a { background: var(--bg-secondary) !important; color: var(--text-1) !important; border-color: var(--border) !important; }
.leaflet-control-attribution { display:none !important; }

</style>
</head>
<body>

<div id="flash"></div>

<header>
  <h1>☢ APOCALYPSE SIMULATOR</h1>
  <div class="hdr-btns">
    <button class="hdr-btn" onclick="shareSimulation()">SHARE</button>
    <button class="hdr-btn" id="btn-hist" onclick="toggleHistorical()">HISTORY</button>
    <button class="hdr-btn" onclick="showInfo()">INFO</button>
  </div>
</header>

<div id="map"></div>
<div id="crosshair"></div>
<div id="coords">LAT: 0.000 | LNG: 0.000</div>
<div id="det-badge">DETONATIONS: 0</div>

<div id="panel">
  <div class="grab-bar" onclick="document.getElementById('panel').classList.toggle('open')"><div class="bar"></div></div>
  <!-- Panel content remains same -->
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="simulator.js"></script> <!-- your JS engine -->
</body>
</html>
